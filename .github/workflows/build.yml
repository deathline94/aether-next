# Builds real installable apps on every push to main (and on tags / manual run).
# Downloads: Actions → run → Artifacts, or the "Latest" GitHub Release (updated every main push).
name: Build apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-apps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-app:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - uses: lukka/get-cmake@latest
      - uses: ilammy/setup-nasm@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Build engine
        working-directory: aether
        run: cargo build --release

      - name: Stage engine
        shell: pwsh
        run: |
          $res = "apps/desktop/src-tauri/resources"
          New-Item -ItemType Directory -Force -Path $res | Out-Null
          Copy-Item -Force "aether/target/release/aether.exe" "$res/aether.exe"
          Copy-Item -Force "packaging/wintun.dll" "$res/wintun.dll"

      - name: Build app
        working-directory: apps/desktop
        shell: pwsh
        run: |
          npm ci
          npm run build
          npm run tauri build

      - name: Package
        shell: pwsh
        run: |
          $out = "dist-windows"
          New-Item -ItemType Directory -Force -Path $out, "$out/portable/engine" | Out-Null
          $nsis = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis" -Filter "*setup.exe" |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $nsis) { throw "installer missing" }
          Copy-Item $nsis.FullName "$out/AetherNext-windows-x64-setup.exe"
          $gui = @(
            "apps/desktop/src-tauri/target/release/Aether Next.exe",
            "apps/desktop/src-tauri/target/release/aether-desktop.exe",
            "apps/desktop/src-tauri/target/release/Aether.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $gui) { throw "gui missing" }
          Copy-Item $gui "$out/portable/AetherNext-Desktop.exe"
          Copy-Item "aether/target/release/aether.exe" "$out/portable/engine/aether.exe"
          Copy-Item "packaging/wintun.dll" "$out/portable/wintun.dll"
          Copy-Item "packaging/wintun.dll" "$out/portable/engine/wintun.dll"
          "Run AetherNext-Desktop.exe" | Set-Content "$out/portable/README.txt"
          Compress-Archive -Path "$out/portable/*" -DestinationPath "$out/AetherNext-portable-windows-x64.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist-windows/AetherNext-windows-x64-setup.exe
            dist-windows/AetherNext-portable-windows-x64.zip
          if-no-files-found: error

  android-apk:
    name: Android APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - uses: lukka/get-cmake@latest
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/android/package-lock.json
      - name: NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          link-to-sdk: true
      - uses: android-actions/setup-android@v3
      - run: cargo install cargo-ndk --locked
      - name: Engine + stage
        working-directory: aether
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
          CMAKE_GENERATOR: Ninja
        run: |
          set -euo pipefail
          for abi in arm64-v8a armeabi-v7a x86_64; do
            cargo ndk -t "$abi" --platform 26 build --release
          done
          mkdir -p ../apps/android/android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          mkdir -p ../apps/android/android/app/src/main/assets/engine
          cp target/aarch64-linux-android/release/aether ../apps/android/android/app/src/main/jniLibs/arm64-v8a/libaether.so
          cp target/armv7-linux-androideabi/release/aether ../apps/android/android/app/src/main/jniLibs/armeabi-v7a/libaether.so
          cp target/x86_64-linux-android/release/aether ../apps/android/android/app/src/main/jniLibs/x86_64/libaether.so
          cp target/aarch64-linux-android/release/aether ../apps/android/android/app/src/main/assets/engine/aether
      - name: UI
        working-directory: apps/android
        run: |
          npm ci
          npm run sync-www
      - name: APKs
        working-directory: apps/android/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.ndk.outputs.ndk-path }}" >> local.properties
          chmod +x ./gradlew
          ./gradlew assembleRelease --stacktrace
          ls -la app/build/outputs/apk/release/
      - name: Collect
        run: |
          set -euo pipefail
          mkdir -p dist-android
          rel=apps/android/android/app/build/outputs/apk/release
          cp "$rel"/app-arm64-v8a-release.apk    dist-android/AetherNext-android-arm64-v8a.apk
          cp "$rel"/app-armeabi-v7a-release.apk  dist-android/AetherNext-android-armeabi-v7a.apk
          cp "$rel"/app-x86_64-release.apk       dist-android/AetherNext-android-x86_64.apk
          cp "$rel"/app-universal-release.apk    dist-android/AetherNext-android-universal.apk
          ls -la dist-android/
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist-android/*.apk
          if-no-files-found: error

  # Always refresh the GitHub Release so downloads stay in one place.
  # - push to main / manual → updates release "Latest" (tag: latest)
  # - push tag v1.2.3 → updates that versioned release
  publish:
    name: Publish downloads
    needs: [windows-app, android-apk]
    if: ${{ always() && needs.windows-app.result == 'success' && needs.android-apk.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Pack + checksums
        id: pack
        run: |
          set -euo pipefail
          mkdir -p out
          find dist -type f \( -name '*.exe' -o -name '*.zip' -o -name '*.apk' \) -exec cp -v {} out/ \;
          cd out
          ls -la
          for f in *; do
            [ -f "$f" ] || continue
            sha256sum "$f" | tee "$f.sha256"
          done
          sha256sum * > SHA256SUMS.txt 2>/dev/null || true
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "title=Latest build" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.pack.outputs.tag }}"
          TITLE="${{ steps.pack.outputs.title }}"
          PRE="${{ steps.pack.outputs.prerelease }}"
          NOTES="Windows installer + portable, Android APKs (arm64 / armv7 / x86_64 / universal).

          Commit: ${GITHUB_SHA}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # Create or reuse release for this tag; move lightweight tag to this commit on main builds
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" --target "$GITHUB_SHA"
            if [ "$PRE" = "true" ]; then gh release edit "$TAG" --prerelease; else gh release edit "$TAG" --latest; fi
          else
            EXTRA=()
            if [ "$PRE" = "true" ]; then EXTRA+=(--prerelease); else EXTRA+=(--latest); fi
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES" --target "$GITHUB_SHA" "${EXTRA[@]}"
          fi

          # Overwrite files with the same names
          gh release upload "$TAG" out/* --clobber
